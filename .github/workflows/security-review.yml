# Claude Security Review
#
# Calls the org-wide reusable workflow from radius-workshop/.github.
#
# Requires the ANTHROPIC_API_KEY secret:
#   - Public repos: automatically available via org secret
#   - Private repos: add as a repo-level secret
#     (Settings > Secrets and variables > Actions > New repository secret)
#
# Quick setup:
#   mkdir -p .github/workflows && curl -o .github/workflows/security-review.yml \
#     https://raw.githubusercontent.com/radius-workshop/.github/main/docs/security-review-caller.yml
#
# For full setup instructions, see:
#   https://github.com/radius-workshop/.github/blob/main/docs/security-review-setup.md

name: Claude Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  security-review:
    # Grant the writes the reusable workflow needs to post findings.
    # Required because a reusable workflow cannot elevate beyond the
    # caller's permissions, and GitHub's default GITHUB_TOKEN permissions
    # are read-only on newer orgs/repos. Without this block the job is
    # rejected before it starts.
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: radius-workshop/.github/.github/workflows/security-review.yml@main
    with:
      fail-on-findings: false  # set to true to fail the build on findings
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
